<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - Nabraj Mahatara</title>
  <meta name="description" content="Get in touch with Nabraj Mahatara for IT infrastructure, system administration, and Linux server management inquiries.">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/styles.css">
</head>
<body>
  <div id="main-header"></div>
  
  <main class="contact-container">
    <h1>Contact Me</h1>
    <p>If you're looking for someone to help manage your IT systems, servers, or need assistance with Linux environments, feel free to reach out!</p>
    <br>
    <form class="contact-form" action="#" method="get" onsubmit="alert('Form submitted successfully!'); return false;">
      <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" required placeholder="Your Name">
      </div>
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" required placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" name="message" rows="5" required placeholder="How can I help you?"></textarea>
      </div>
      <button type="submit">Send Message</button>
    </form>
  </main>
  
  <div id="main-footer"></div>
  <script src="js/components.js"></script>
</body>
</html>
